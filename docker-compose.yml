services:
  backend:
    # build: is used for local development (docker compose build).
    # image: names the tag produced locally and the image pulled on deployment targets.
    # On deployment VMs, IMAGE_TAG is set via .env — compose pulls from GHCR, never builds.
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ghcr.io/phildue/finance_tracker/backend:${IMAGE_TAG:-local}
    user: "1000:1000"
    environment:
      - DB_PATH=/data/expenses.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    # build: is used for local development (docker compose build).
    # image: names the tag produced locally and the image pulled on deployment targets.
    # On deployment VMs, IMAGE_TAG is set via .env — compose pulls from GHCR, never builds.
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ghcr.io/phildue/finance_tracker/frontend:${IMAGE_TAG:-local}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
