services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    user: "1000:1000"
    environment:
      - DB_PATH=/data/expenses.db
    volumes:
      - ./data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
