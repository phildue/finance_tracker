server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /expenses {
        # No trailing slash on proxy_pass: nginx forwards the full URI (/expenses/...)
        # to the backend, which expects it. Adding a trailing slash would strip the prefix.
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
